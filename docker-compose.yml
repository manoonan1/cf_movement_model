services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: movements
      POSTGRES_PASSWORD: movements
      POSTGRES_DB: movements
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movements"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://movements:movements@db:5432/movements
    volumes:
      - ./dashboard:/app/dashboard
      - ./api:/app/api
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
