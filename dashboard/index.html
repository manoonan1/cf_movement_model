<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossFit Movement Model Editor</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Movement Editor</h1>
        <div class="file-actions">
          <button class="btn btn-secondary" onclick="refreshMovements()">Refresh</button>
        </div>
      </div>
      <div class="movement-list" id="movement-list"></div>
      <button class="btn btn-primary add-movement-btn" onclick="addNewMovement()">+ Add Movement</button>
    </aside>

    <main class="main-content" id="main-content">
      <div class="empty-state">
        <h3>No movement selected</h3>
        <p>Select a movement from the list or add a new one</p>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
  <script src="/js/renderer.js"></script>
  <script src="/js/editor.js"></script>
</body>
</html>
