<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossFit Movement Model Editor</title>
  <link rel="stylesheet" href="/css/styles.css?v=3">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="tab-bar">
    <button class="tab active" data-view="editor" onclick="switchView('editor')">Editor</button>
    <button class="tab" data-view="stats" onclick="switchView('stats')">Stats</button>
    <button class="tab" data-view="audit" onclick="switchView('audit')">Audit</button>
  </nav>

  <div id="view-editor" class="view">
    <div class="container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>Movement Editor</h1>
          <div class="file-actions">
            <button class="btn btn-secondary" onclick="refreshMovements()">Refresh</button>
            <button class="btn btn-secondary" onclick="exportMovements()">Export</button>
            <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Import</button>
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importMovements(event)">
          </div>
        </div>
        <div class="sidebar-search">
          <input type="text" id="search-input" placeholder="Search movements..." oninput="renderMovementList()">
        </div>
        <div class="movement-list" id="movement-list"></div>
        <button class="btn btn-primary add-movement-btn" onclick="addNewMovement()">+ Add Movement</button>
      </aside>

      <main class="main-content" id="main-content">
        <div class="empty-state">
          <h3>No movement selected</h3>
          <p>Select a movement from the list or add a new one</p>
        </div>
      </main>
    </div>
  </div>

  <div id="view-stats" class="view" style="display:none"></div>
  <div id="view-audit" class="view" style="display:none"></div>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title">New Movement</h3>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="modal-name" placeholder="e.g. Back Squat" oninput="autoGenerateId()">
      </div>
      <div class="form-group">
        <label>ID</label>
        <input type="text" id="modal-id" placeholder="e.g. back-squat">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-confirm" onclick="confirmModal()">Create</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/app.js?v=3"></script>
  <script src="/js/renderer.js?v=3"></script>
  <script src="/js/editor.js?v=3"></script>
  <script src="/js/stats.js?v=3"></script>
  <script src="/js/audit.js?v=3"></script>
</body>
</html>
